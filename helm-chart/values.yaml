# Default values for onlineboutique.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

images:
  adservice:
    repository: ghcr.io/yasssh-bombale/aws-eks-gitops-microservices-platform/adservice
    # Overrides the image tag whose default is the chart appVersion.
    tag: sha-cb91c2fdb169872e90d2c26a4eb27838e0a55404
  cartservice:
    repository: ghcr.io/yasssh-bombale/aws-eks-gitops-microservices-platform/cartservice
    tag: v0.10.5
  checkoutservice:
    repository: ghcr.io/yasssh-bombale/aws-eks-gitops-microservices-platform/checkoutservice
    tag: sha-13080675605735e4f4a71f52053bec483de4af4c
  currencyservice:
    repository: ghcr.io/yasssh-bombale/aws-eks-gitops-microservices-platform/currencyservice
    tag: sha-3236ddf2acaa3a206aefad49ec97c47593ee5a3c
  emailservice:
    repository: ghcr.io/yasssh-bombale/aws-eks-gitops-microservices-platform/emailservice
    tag: sha-8f7e720a463d690aa2e45ddebd06bd1c9a6fbed8
  frontend:
    repository: ghcr.io/yasssh-bombale/aws-eks-gitops-microservices-platform/frontend
    tag: sha-f0bd96de995866ea2c85c8bd33ffa37ad333cc70
  loadgenerator:
    repository: ghcr.io/yasssh-bombale/aws-eks-gitops-microservices-platform/loadgenerator
    tag: sha-caeddb82843d3e91bc3b8da1d20d89001dffbded
  paymentservice:
    repository: ghcr.io/yasssh-bombale/aws-eks-gitops-microservices-platform/paymentservice
    tag: sha-5d8069ef69201cf41f232864af9d4fed6ac62692
  productcatalogservice:
    repository: ghcr.io/yasssh-bombale/aws-eks-gitops-microservices-platform/productcatalogservice
    tag: sha-89691c322221ff6613a12fe0cfe814fdaf6336b9
  recommendationservice:
    repository: ghcr.io/yasssh-bombale/aws-eks-gitops-microservices-platform/recommendationservice
    tag: sha-2d5ddfdd0b6026c2bad51f8915657c6421690baa
  shippingservice:
    repository: ghcr.io/yasssh-bombale/aws-eks-gitops-microservices-platform/shippingservice
    tag: sha-b525d1b501fdd12e70668b876b3c4b1d6bb2bf27

serviceAccounts:
  # Specifies whether service accounts should be created.
  create: true
  # Annotations to add to the service accounts.
  annotations: {}
  # Annotations to add only for the cartservice app. This allows to follow the least privilege principle where only cartservice needs to connect to external database for example via Workload Identity.
  annotationsOnlyForCartservice: false

networkPolicies:
  # Specifies if the NetworkPolicies are created or not. If true, one fine granular NetworkPolicy per app is created.
  create: false

sidecars:
  # Specifies if the Sidecars are created or not. If true, one fine granular Sidecar per app is created.
  create: false

authorizationPolicies:
  # Specifies if the AuthorizationPolicies are created or not. If true, one fine granular AuthorizationPolicy per app is created.
  create: false

opentelemetryCollector:
  create: false
  name: opentelemetrycollector
  # Specifies the project id for the otel collector. If set as "PROJECT_ID" (default value), an initContainer will automatically retrieve the project id value from the metadata server.
  projectId: "PROJECT_ID"

googleCloudOperations:
  profiler: false
  tracing: false
  metrics: false

seccompProfile:
  enable: false
  type: RuntimeDefault

securityContext:
  enable: true

adService:
  create: true
  name: adservice
  resources:
    requests:
      cpu: 200m
      memory: 180Mi
    limits:
      cpu: 300m
      memory: 300Mi

cartService:
  create: true
  name: cartservice
  resources:
    requests:
      cpu: 200m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi

checkoutService:
  create: true
  name: checkoutservice
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

currencyService:
  create: true
  name: currencyservice
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

emailService:
  create: true
  name: emailservice
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

frontend:
  create: true
  name: frontend
  externalService: false
  cymbalBranding: false
  # One of: local, gcp, aws, azure, onprem, alibaba. When not set, defaults to "local" unless running in GKE, otherwise auto-sets to gcp.
  platform: aws
  singleSharedSession: false
  virtualService:
    create: false
    hosts:
      - "*"
    gateway:
      name: asm-ingressgateway
      namespace: asm-ingress
      labelKey: asm
      labelValue: ingressgateway
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

loadGenerator:
  create: true
  name: loadgenerator
  checkFrontendInitContainer: true
  resources:
    requests:
      cpu: 300m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

paymentService:
  create: true
  name: paymentservice
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

productCatalogService:
  create: true
  name: productcatalogservice
  # Specifies an extra latency to any request on productcatalogservice, by default no extra latency.
  extraLatency: ""
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

recommendationService:
  create: true
  name: recommendationservice
  resources:
    requests:
      cpu: 100m
      memory: 220Mi
    limits:
      cpu: 200m
      memory: 450Mi

shippingService:
  create: true
  name: shippingservice
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

cartDatabase:
  # Specifies the type of the cartservice's database, could be either redis or spanner.
  type: redis
  connectionString: "redis-cart:6379"
  inClusterRedis:
    create: true
    name: redis-cart
    # Uses the public redis image from Docker Hub, otherwise will use the images.repository.
    publicRepository: true
  externalRedisTlsOrigination:
    enable: false
    name: exernal-redis-tls-origination
    endpointAddress: ""
    endpointPort: ""
    certificate: ""

# @TODO: This service is not currently available in Helm.
# https://github.com/GoogleCloudPlatform/microservices-demo/tree/main/kustomize/components/shopping-assistant
shoppingAssistantService:
  create: false
  name: shoppingassistantservice
